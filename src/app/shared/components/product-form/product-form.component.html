<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body">
                <h3 class="text-center p-3 bg-primary">{{isInEditMode? 'Update Product' : 'Add Product'}}</h3>
                <form [formGroup]="productForm" (ngSubmit)="onproductAdd()">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" formControlName="pname" class="form-control">
                        <small *ngIf="productForm.get('pname')?.touched && productForm.get('pname')?.invalid">
                            Name is required
                        </small>
                    </div>
                    <br>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" formControlName="pprice" class="form-control">
                        <small *ngIf="productForm.get('pprice')?.touched && productForm.get('pprice')?.invalid">
                            Price is required
                        </small>
                    </div>
                    <br>
                    <div class="form-group">
                        <label>Status</label>
                        <select formControlName="pstatus" type="text" class="form-control" id="pstatus">
                            <option value="In-Progress">In-Progress</option>
                            <option value="Dispatched">Dispatched</option>
                            <option value="Delivered">Delivered</option>
                        </select>
                    </div>

                    <br>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea formControlName="pdescription" class="form-control"></textarea>

                        <small
                            *ngIf="productForm.get('pdescription')?.touched && productForm.get('pdescription')?.invalid">
                            Description is required
                        </small>
                    </div>
                    <br>
                    <div class="form-group">
                        <label>Image</label>
                        <input type="text" class="form-control" formControlName="pimage">
                        <small *ngIf="productForm.get('pimage')?.touched && productForm.get('pimage')?.invalid">
                            Image is required
                        </small>
                    </div>
                    <br>
                    <div class="form-group">
                        <label for="canReturn">Product Return</label>
                        <select formControlName="canReturn" type="text" class="form-control" id="canReturn">
                            <option [ngValue]="1">Yes</option>
                            <option [ngValue]="0">No</option>
                        </select>
                    </div>
                    <button *ngIf="!isInEditMode" type="submit" class="btn btn-sm btn-outline-primary w-100">Add
                        Product</button>
                    <button *ngIf="isInEditMode" type="button" (click)="onUpdate()"
                        class="btn btn-sm btn-outline-primary w-100">Update Product</button>
                </form>

            </div>
        </div>
    </div>
</div>

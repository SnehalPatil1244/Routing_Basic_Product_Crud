<div class="row">
    <div class="col-12 text-right mb-4 mt-4">
        <button routerLink="addUser" mat-raised-button color="primary">Add User</button>
    </div>
    <div class="col-md-4">
        <ul class="list-group">
            <li [routerLink]="['/users',user.userId]"
            *ngFor="let user of UsersArr" class="list-group-item d-flex justify-content-between align-items-center">
                {{user.userName}}
                <small class="badge"
                [ngClass]="{
                    'badge-success' : user.isActive,
                    'badge-danger' : !user.isActive
                }"
                >{{user.isActive ? 'Active' : 'InActive'}}</small>
            </li>
        </ul>
  
    </div>
    <div class="col-md-8">

    </div>
</div>
